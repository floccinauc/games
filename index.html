<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>STARSHARD</title>
<style>
  :root{
    --void-deep:#060912; --panel:rgba(11,18,36,.86);
    --cyan:#36e6ff; --cyan-dim:#1a7d94; --gold:#ffd84d; --danger:#ff3b5c;
    --text:#dce8ff; --dim:#7d8bb0;
    --label:600 13px/1.2 system-ui,-apple-system,"Segoe UI",sans-serif;
    --mono:600 15px/1 ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:var(--void-deep);
    font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);
    user-select:none;-webkit-user-select:none;touch-action:none;overscroll-behavior:none}
  #game{display:block;position:fixed;inset:0;width:100vw;height:100vh;height:100dvh;
    background:radial-gradient(130% 100% at 50% 40%,#0c1428 0%,#070b18 55%,#04060e 100%);touch-action:none}

  #hud{position:fixed;inset:0;pointer-events:none;z-index:5}
  .hud-top{position:absolute;top:max(12px,env(safe-area-inset-top));left:0;right:0;
    display:flex;justify-content:center;gap:24px;align-items:baseline;text-shadow:0 1px 6px #000}
  .stat{text-align:center}
  .stat-num{font:var(--mono);font-size:21px;letter-spacing:.5px;color:var(--text)}
  .stat-lab{font:var(--label);font-size:9px;letter-spacing:2.2px;text-transform:uppercase;color:var(--dim);display:block;margin-top:3px}
  .stat.lvl .stat-num{color:var(--cyan)} .stat.pts .stat-num{color:var(--gold)}
  .stat.boss.active .stat-num{color:var(--danger)} .stat.boss.active .stat-lab{color:var(--danger)}

  #weapons{position:absolute;top:calc(max(12px,env(safe-area-inset-top)) + 58px);left:max(12px,env(safe-area-inset-left));
    display:flex;flex-direction:column;gap:5px}
  .wchip{display:flex;align-items:center;gap:6px;background:rgba(11,18,36,.55);border:1px solid rgba(54,230,255,.18);
    border-radius:8px;padding:4px 8px 4px 6px;backdrop-filter:blur(3px)}
  .wchip .wi{font-size:15px;line-height:1}
  .wchip .wl{font:var(--label);font-size:10px;letter-spacing:1px;color:var(--cyan)}
  .wchip.empty{opacity:.4}

  .vitals{position:absolute;left:50%;transform:translateX(-50%);bottom:max(18px,env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:8px;width:min(460px,84vw)}
  .vital-row{display:flex;align-items:center;gap:9px}
  .vital-ico{font-size:15px;width:18px;text-align:center}
  .bar{flex:1;height:16px;border-radius:8px;background:rgba(255,255,255,.07);overflow:hidden;position:relative;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.07)}
  .bar > i{position:absolute;inset:0;transform-origin:left;border-radius:8px;transition:transform .08s linear}
  .bar-text{position:absolute;inset:0;display:grid;place-items:center;font:var(--mono);font-size:11px;
    color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.7);letter-spacing:.5px}
  #hpFill{background:linear-gradient(90deg,#ff3b5c,#ff7a9a)}
  #shFill{background:linear-gradient(90deg,var(--cyan),#aef3ff)}

  .ctrl-btn{position:fixed;z-index:6;display:grid;place-items:center;
    border:1.5px solid var(--cyan-dim);color:var(--cyan);background:rgba(11,18,36,.5);
    backdrop-filter:blur(4px);font:var(--label);text-transform:uppercase;letter-spacing:1.5px}
  #shieldBtn{right:max(22px,env(safe-area-inset-right));bottom:calc(max(18px,env(safe-area-inset-bottom)) + 70px);
    width:94px;height:94px;border-radius:50%;box-shadow:0 0 24px rgba(54,230,255,.18),inset 0 0 18px rgba(54,230,255,.12)}
  #shieldBtn:active,#shieldBtn.on{background:rgba(54,230,255,.22);box-shadow:0 0 36px rgba(54,230,255,.5),inset 0 0 24px rgba(54,230,255,.3)}
  #shieldBtn .ico{font-size:30px}
  #abilityBtn{display:flex;flex-direction:column;align-items:center;justify-content:center;
    left:max(22px,env(safe-area-inset-left));bottom:calc(max(18px,env(safe-area-inset-bottom)) + 70px);
    width:78px;height:78px;border-radius:50%;border-color:#7a6cff;color:#cdd6ff;position:relative;
    box-shadow:0 0 22px rgba(122,108,255,.22),inset 0 0 16px rgba(122,108,255,.14)}
  #abilityBtn:active:not(.empty){background:rgba(122,108,255,.24);box-shadow:0 0 34px rgba(122,108,255,.5)}
  #abilityBtn.empty{opacity:.32}
  #abilityBtn .ico{font-size:26px;line-height:1}
  #abilityBtn .ab-name{font-size:7.5px;letter-spacing:1px;margin-top:1px;opacity:.85}
  #abilityBtn .ab-count{position:absolute;top:-2px;right:-2px;min-width:20px;height:20px;border-radius:10px;
    background:#7a6cff;color:#fff;font:700 11px/20px system-ui;text-align:center;box-shadow:0 0 8px rgba(122,108,255,.6)}
  #pauseBtn{top:max(12px,env(safe-area-inset-top));right:max(14px,env(safe-area-inset-right));
    width:42px;height:42px;border-radius:10px;font-size:16px}

  .screen{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;
    align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto;
    background:radial-gradient(120% 90% at 50% 30%,rgba(13,23,48,.82),rgba(4,6,14,.95));backdrop-filter:blur(3px)}
  .screen.show{display:flex;animation:fade .25s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .title{font-size:clamp(46px,13vw,104px);font-weight:800;letter-spacing:.14em;color:var(--cyan);
    text-shadow:0 0 30px rgba(54,230,255,.55),0 0 6px rgba(54,230,255,.8);margin-bottom:6px}
  .tagline{font:var(--label);letter-spacing:4px;text-transform:uppercase;color:var(--dim);margin-bottom:30px}
  .screen h2{font-size:clamp(24px,6.5vw,38px);font-weight:800;letter-spacing:.07em;margin-bottom:8px}
  .controls{font-size:15px;color:var(--dim);line-height:1.85;margin-bottom:28px;max-width:350px}
  .controls b{color:var(--text);font-weight:600}
  .controls .key{display:inline-block;border:1px solid var(--cyan-dim);border-radius:5px;padding:1px 7px;
    color:var(--cyan);font:var(--mono);font-size:12px;margin:0 1px}
  .diff-row{display:flex;gap:10px;margin-bottom:24px}
  .diff{pointer-events:auto;cursor:pointer;border:1.5px solid var(--cyan-dim);color:var(--dim);background:rgba(11,18,36,.5);
    border-radius:10px;padding:11px 22px;font:var(--label);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;transition:.16s}
  .diff.selected{border-color:var(--cyan);color:var(--cyan);background:rgba(54,230,255,.12);box-shadow:0 0 16px rgba(54,230,255,.2)}
  .btn{pointer-events:auto;cursor:pointer;border:1.5px solid var(--cyan);color:var(--cyan);background:transparent;
    border-radius:11px;padding:14px 42px;font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;transition:.16s}
  .btn:hover,.btn:active{background:var(--cyan);color:#04101a;box-shadow:0 0 28px rgba(54,230,255,.5)}
  .btn.ghost{border-color:var(--dim);color:var(--dim)} .btn.ghost:hover{background:var(--dim);color:#0a0e1a;box-shadow:none}
  .stats-grid{display:flex;gap:30px;margin:16px 0 28px;flex-wrap:wrap;justify-content:center}
  .stats-grid .v{font:var(--mono);font-size:34px;color:var(--cyan)}
  .stats-grid .l{font:var(--label);font-size:10px;letter-spacing:2.2px;text-transform:uppercase;color:var(--dim);margin-top:4px}
  .best{font:var(--label);letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-top:24px}
  .best b{color:var(--gold)}

  #shopScreen h2{color:var(--gold);text-shadow:0 0 22px rgba(255,216,77,.4)}
  .balance{font:var(--mono);font-size:30px;color:var(--gold);margin:4px 0 20px;letter-spacing:1px}
  .cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:760px}
  .card{pointer-events:auto;cursor:pointer;width:172px;min-height:178px;border-radius:14px;background:var(--panel);
    border:1px solid rgba(54,230,255,.22);padding:18px 14px;display:flex;flex-direction:column;align-items:center;
    gap:8px;transition:.16s;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cyan)}
  .card.weapon::before{background:var(--gold)}
  .card:hover:not(.disabled){transform:translateY(-4px);border-color:var(--cyan);box-shadow:0 12px 32px rgba(0,0,0,.5),0 0 20px rgba(54,230,255,.22)}
  .card.disabled{opacity:.4;cursor:not-allowed}
  .card .ic{font-size:34px;margin-top:2px}
  .card .nm{font-weight:700;letter-spacing:1.5px;text-transform:uppercase;font-size:13px;color:var(--text)}
  .card .ds{font-size:12.5px;color:var(--dim);line-height:1.4}
  .card .tag{font:var(--label);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);opacity:.85}
  .card .cost{margin-top:auto;font:var(--mono);font-size:15px;color:var(--gold)}
  .shop-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:24px;align-items:center}
  .mini{pointer-events:auto;cursor:pointer;border:1.5px solid var(--cyan-dim);color:var(--cyan);background:rgba(11,18,36,.5);
    border-radius:10px;padding:12px 22px;font:var(--label);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;transition:.16s}
  .mini:hover:not(:disabled){background:rgba(54,230,255,.15)} .mini:disabled{opacity:.4;cursor:not-allowed}

  #toast{position:fixed;top:23%;left:50%;transform:translateX(-50%);z-index:15;
    font-size:clamp(19px,4.6vw,28px);font-weight:800;letter-spacing:.16em;text-transform:uppercase;
    color:var(--danger);text-shadow:0 0 24px rgba(255,59,92,.6);pointer-events:none;opacity:0;text-align:center}
  #toast.show{animation:toast 2.6s ease forwards}
  @keyframes toast{0%{opacity:0;transform:translate(-50%,12px) scale(.9)}14%,72%{opacity:1;transform:translate(-50%,0) scale(1)}100%{opacity:0;transform:translate(-50%,-10px)}}
  .hide{display:none!important}
  @media (max-width:560px){.hud-top{gap:16px}.stat-num{font-size:18px}}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud" class="hide">
  <div class="hud-top">
    <div class="stat lvl"><span id="lvlVal" class="stat-num">1</span><span class="stat-lab">Level</span></div>
    <div class="stat boss" id="bossStat"><span id="bossVal" class="stat-num">0:35</span><span id="bossLab" class="stat-lab">Boss In</span></div>
    <div class="stat pts"><span id="ptsVal" class="stat-num">0</span><span class="stat-lab">Shards</span></div>
    <div class="stat"><span id="killVal" class="stat-num">0</span><span class="stat-lab">Kills</span></div>
  </div>
  <div id="weapons"></div>
  <div class="vitals">
    <div class="vital-row"><span class="vital-ico">&#10084;</span><div class="bar"><i id="hpFill"></i><span id="hpText" class="bar-text">100</span></div></div>
    <div class="vital-row"><span class="vital-ico">&#128737;</span><div class="bar"><i id="shFill"></i></div></div>
  </div>
</div>

<button id="abilityBtn" class="ctrl-btn hide empty"><span class="ico" id="abIco">&#9889;</span><span class="ab-name" id="abName"></span><span class="ab-count" id="abCount" style="display:none">0</span></button>
<button id="shieldBtn" class="ctrl-btn hide"><span class="ico">&#128737;</span></button>
<button id="pauseBtn" class="ctrl-btn hide">&#9208;</button>
<div id="toast"></div>

<div id="startScreen" class="screen show">
  <div class="title">STARSHARD</div>
  <div class="tagline">Drift &middot; Auto-fire &middot; Survive</div>
  <div class="controls" id="ctrlHint"></div>
  <div class="diff-row" id="diffRow">
    <button class="diff" data-d="easy">Easy</button>
    <button class="diff selected" data-d="normal">Normal</button>
    <button class="diff" data-d="hard">Hard</button>
  </div>
  <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center">
    <button id="tiltBtn" class="btn ghost" style="flex:1 1 28%;margin:0;min-width:92px">Tilt: OFF</button>
    <button id="fsBtn" class="btn ghost" style="flex:1 1 28%;margin:0;min-width:92px">Fullscreen</button>
    <button id="musicBtn" class="btn ghost" style="flex:1 1 28%;margin:0;min-width:92px">Music: ON</button>
  </div>
  <button id="playBtn" class="btn">Launch</button>
  <button id="hangarBtn" class="btn ghost" style="margin-top:12px">Hangar &#9670; <span id="startTokens">0</span></button>
  <div class="best" id="startBest"></div>
</div>

<div id="shopScreen" class="screen">
  <h2 id="shopTitle">Outpost</h2>
  <div class="balance">&#9670; <span id="shopBal">0</span></div>
  <div class="cards" id="shopCards"></div>
  <div class="shop-actions">
    <button id="rerollBtn" class="mini">Reroll</button>
    <button id="repairBtn" class="mini">Repair Hull</button>
    <button id="shopHangarBtn" class="mini">Hangar &#9670; <span id="shopTokens">0</span></button>
    <button id="nextBtn" class="btn">Next Level</button>
  </div>
</div>

<div id="pauseScreen" class="screen">
  <h2>Paused</h2>
  <button id="resumeBtn" class="btn" style="margin-top:16px">Resume</button>
  <button id="restartBtn" class="btn ghost" style="margin-top:12px">Restart Run</button>
  <button id="quitBtn" class="btn ghost" style="margin-top:12px">Main Menu</button>
</div>

<div id="overScreen" class="screen">
  <h2 style="color:var(--danger);text-shadow:0 0 22px rgba(255,59,92,.4)">Ship Destroyed</h2>
  <div class="stats-grid">
    <div><div class="v" id="ovLevel">1</div><div class="l">Reached</div></div>
    <div><div class="v" id="ovKills">0</div><div class="l">Kills</div></div>
    <div><div class="v" id="ovTime">0:00</div><div class="l">Survived</div></div>
    <div><div class="v" id="ovTokens">0</div><div class="l">Tokens</div></div>
  </div>
  <button id="againBtn" class="btn">Launch Again</button>
  <div class="best" id="overBest"></div>
</div>

<div id="metaScreen" class="screen">
  <h2 id="metaTitle">Hangar</h2>
  <div class="balance">&#9670; <span id="metaBal">0</span> <span style="font-size:13px;color:var(--dim);letter-spacing:2px">TOKENS</span></div>
  <div class="cards" id="metaCards"></div>
  <div class="shop-actions"><button id="metaBackBtn" class="btn">Back</button></div>
</div>

<script>
"use strict";
/* ================================================================
   STARSHARD v3 - bigger world + camera, asteroids, ambiance
   CONFIG: every tunable lives in `cfg` and the WEAPONS stat fns.
   ================================================================ */
const cfg = {
  world:{ screens:3.5, fovDiag:1500, asteroidShard:4, asteroidCrate:0.05 },   // map = screens x view; fovDiag = visible diagonal (world units) — identical on every device
  player:{
    radius:13, speed:236, accel:13,
    maxHP:100, regen:0, iframes:0.6, magnet:750,
    critChance:0, critMult:2,
    mDamage:1, mCooldown:1, mArea:1, mAmount:0, mProjSpeed:1,    // global weapon modifiers
    shieldMax:3.0, shieldDrain:1.0, shieldRecharge:0.55, shieldDelay:0.8, shieldShove:235,
  },
  level:{ bossKillsBase:26, bossKillsPerLevel:8 },
  spawn:{ startInterval:1.25, minInterval:0.30, hpPerLevel:0.42, maxEnemies:280 },
  boss:{ hpBase:1700, hpPerLevel:1300, hpAccel:210 },
  econ:{ crateChance:0.02, weaponBuy:65, weaponUp:34, reroll:14, repairCost:30, repairAmt:60, offers:6, costGrowth:1.7, upgradeMul:1.5, metaMul:5 },
  dda:{ decay:1.5, k:11, max:2.2 },
  gemLife:14, powerupChance:0.014, powerupLife:16, abilityMax:3, tokenChance:0.01,
  juice:{ damageNumbers:false, shake:true },
};
const DIFF = {
  easy:  {hp:0.8, dmg:0.8, spawn:0.85, boss:0.85},
  normal:{hp:1.0, dmg:1.0, spawn:1.0,  boss:1.0},
  hard:  {hp:1.35,dmg:1.25,spawn:1.2,  boss:1.4},
};

// enemy archetypes (sides:0 => circle). pts = shards each gem is worth.
const ETYPES = {
  grunt:  {hp:6,  speed:62, r:14, dmg:11, pts:3, color:"#ff4d9d", sides:3, unlock:0,  wt:5},
  swarmer:{hp:3,  speed:126,r:9,  dmg:7,  pts:2, color:"#ffe14d", sides:0, unlock:10, wt:4, cluster:[3,5]},
  shooter:{hp:13, speed:52, r:15, dmg:10, pts:6, color:"#4dffa3", sides:4, unlock:18, wt:3,
           ranged:true, range:290, fireEvery:1.6, bSpeed:195, bDmg:10},
  weaver: {hp:9,  speed:90, r:12, dmg:12, pts:5, color:"#c77dff", sides:3, unlock:22, wt:3, move:"weave", wobRate:9, wobAmp:165},
  tank:   {hp:40, speed:34, r:25, dmg:20, pts:6, color:"#ff6a2b", sides:6, unlock:30, wt:2, gems:3},
  charger:{hp:18, speed:42, r:16, dmg:18, pts:7, color:"#ff8a3d", sides:4, unlock:36, wt:2, move:"charge", chargeRange:340, windup:0.5, dashTime:0.42, dashSpeed:580},
  orbiter:{hp:15, speed:118,r:13, dmg:11, pts:7, color:"#36e6ff", sides:5, unlock:44, wt:2, move:"orbit", orbitR:220, fireEvery:1.4, bSpeed:215, bDmg:10},
};
const BOSSES = {
  warship: {kind:"warship", name:"Warship",   boss:true, gems:9, pts:20, color:"#ff3b5c", sides:8, r:44, speed:30, dmg:28,
            fireEvery:1.9, bSpeed:175, bDmg:13, burst:16},
  lance:   {kind:"lance",   name:"Lance",     boss:true, gems:9, pts:20, color:"#ff7a29", sides:3, r:40, speed:24, dmg:26,
            warn:1.1, lock:0.4, fireDur:0.5, cool:1.0, rayW:15, rayLen:560, rayDmg:30, turn:1.7},
  layer:   {kind:"layer",   name:"Minelayer", boss:true, gems:9, pts:20, color:"#b06bff", sides:6, r:42, speed:27, dmg:26,
            fireEvery:1.25, mineR:78, mineDmg:26, mineLife:9},
  bombard: {kind:"bombard", name:"Bombard",   boss:true, gems:9, pts:20, color:"#ffd84d", sides:5, r:46, speed:20, dmg:26,
            fireEvery:1.6, bombSpeed:140, bombFuse:3.2, bombHp:16, bombR:96, bombDmg:34},
  carrier: {kind:"carrier", name:"Carrier",   boss:true, gems:9, pts:20, color:"#4dffa3", sides:7, r:50, speed:17, dmg:26,
            fireEvery:3.4, drone:"swarmer", droneCount:3},
  spinner: {kind:"spinner", name:"Spinner",   boss:true, gems:9, pts:20, color:"#ff5cc8", sides:8, r:43, speed:26, dmg:26,
            fireEvery:0.11, bSpeed:175, bDmg:11, arms:2, spinRate:2.7},
  sweeper: {kind:"sweeper", name:"Sweeper",   boss:true, gems:9, pts:20, color:"#36e6ff", sides:6, r:44, speed:18, dmg:26,
            rayW:14, rayLen:600, rayDmg:22, sweep:0.95},
  gravity: {kind:"gravity", name:"Gravity Well", boss:true, gems:9, pts:20, color:"#a06bff", sides:0, r:46, speed:14, dmg:26,
            pull:150, fireEvery:2.0, bSpeed:120, bDmg:12, burst:11},
  splitter:{kind:"splitter",name:"Splitter",  boss:true, gems:9, pts:20, color:"#ff8a3d", sides:5, r:46, speed:24, dmg:26,
            fireEvery:2.1, bSpeed:160, bDmg:12, burst:10},
  sniper:  {kind:"sniper",  name:"Marksman",  boss:true, gems:9, pts:20, color:"#9fffce", sides:3, r:40, speed:14, dmg:26,
            fireEvery:1.7, bSpeed:360, bDmg:14, lead:0.32, spread:0.13, shots:3},
  blink:   {kind:"blink",   name:"Phantom",   boss:true, gems:9, pts:20, color:"#c77dff", sides:7, r:42, speed:0, dmg:26,
            fireEvery:1.5, bSpeed:185, bDmg:12, burst:11, blinkDist:250},
  pulsar:  {kind:"pulsar",  name:"Pulsar",    boss:true, gems:9, pts:20, color:"#ff5cb4", sides:6, r:46, speed:16, dmg:26,
            fireEvery:2.5, ringSpeed:255, ringMax:540, ringW:17, ringDmg:24, gapW:0.85},
  sentinel:{kind:"sentinel",name:"Sentinel",  boss:true, gems:9, pts:20, color:"#5cc8ff", sides:8, r:46, speed:15, dmg:26,
            fireEvery:2.0, bSpeed:160, bDmg:12, burst:9, shards:4, shardR:78, shardHp:24, shardSpin:1.2},
  reflect: {kind:"reflect", name:"Reflector", boss:true, gems:9, pts:20, color:"#ffd84d", sides:6, r:44, speed:24, dmg:26,
            aimEvery:1.9, shieldArc:1.2, reflectChance:0.1, rDmg:14},
};

    if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){
      DeviceOrientationEvent.requestPermission().then(s=>{ if(s==="granted")add(); else if(b)b.textContent="Tilt: blocked"; }).catch(()=>{ if(b)b.textContent="Tilt: blocked"; }); }
    else add(); }
  else { tilt.on=false; window.removeEventListener("deviceorientation",onTilt); if(b){b.classList.remove("on");b.textContent="Tilt: OFF";} } }

function fsActive(){ return !!(document.fullscreenElement||document.webkitFullscreenElement); }
function goFullscreen(){ const el=document.documentElement, fn=el.requestFullscreen||el.webkitRequestFullscreen; if(fn&&!fsActive()){ try{ fn.call(el); }catch(e){} } }
function exitFullscreen(){ const fn=document.exitFullscreen||document.webkitExitFullscreen; if(fn&&fsActive()){ try{ fn.call(document); }catch(e){} } }

/* ---------------- music (generative web audio) ---------------- */
let musicOn=true;
const audio={ctx:null,master:null,tempo:96,timer:null,nextT:0,step:0};
function initAudio(){ if(audio.ctx)return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return;
  audio.ctx=new AC(); audio.master=audio.ctx.createGain(); audio.master.gain.value=0; audio.master.connect(audio.ctx.destination); }
function startMusic(){ initAudio(); const c=audio.ctx; if(!c)return; if(c.state==="suspended")c.resume();
  audio.master.gain.cancelScheduledValues(c.currentTime); audio.master.gain.linearRampToValueAtTime(0.16,c.currentTime+1.4);
  audio.nextT=c.currentTime+0.08; if(!audio.timer)audio.timer=setInterval(musicTick,25); }
function stopMusic(){ const c=audio.ctx; if(!c)return; audio.master.gain.cancelScheduledValues(c.currentTime); audio.master.gain.linearRampToValueAtTime(0,c.currentTime+0.25); }
function mNote(freq,t,dur,type,gain,glide){ const c=audio.ctx,o=c.createOscillator(),g=c.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,t); if(glide)o.frequency.exponentialRampToValueAtTime(glide,t+dur*0.9);
  g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(gain,t+0.012); g.gain.exponentialRampToValueAtTime(0.0006,t+dur);
  o.connect(g); g.connect(audio.master); o.start(t); o.stop(t+dur+0.03); }
const M_SCALE=[0,3,5,7,10], M_BASS=[0,0,5,7], mHz=n=>440*Math.pow(2,(n-69)/12);
function musicStep(s,t){ const boss=bossesAlive>0;
  if(s%4===0){ mNote(mHz(33+M_BASS[(s/4)%M_BASS.length]),t,0.26,"triangle",0.55); }
  if(s%8===0){ mNote(150,t,0.12,"sine",0.6,46); }
  if(s%2===0){ mNote(mHz(60+M_SCALE[(s/2)%M_SCALE.length]+(boss?12:0)),t,boss?0.10:0.13,"square",0.14); }
  if(boss&&s%4===2){ mNote(mHz(72+M_SCALE[s%M_SCALE.length]),t,0.07,"sawtooth",0.10); }
  if(boss&&s%2===1){ mNote(mHz(90+M_SCALE[s%M_SCALE.length]),t,0.04,"square",0.06); } }
function musicTick(){ const c=audio.ctx; if(!c||!musicOn)return;
  const target=bossesAlive>0?150:96; audio.tempo+=(target-audio.tempo)*0.04;
  const spb=60/audio.tempo/4; let guard=0;
  while(audio.nextT<c.currentTime+0.1&&guard++<48){ musicStep(audio.step,audio.nextT); audio.nextT+=spb; audio.step=(audio.step+1)%32; }
  if(audio.nextT<c.currentTime)audio.nextT=c.currentTime+spb; }

/* ---------------- asteroids ---------------- */
function asteroidTarget(){ return clamp(Math.round(worldW*worldH/(620*620)),8,26); }
function makeAsteroid(pos){ const r=rand(22,42), k=randi(8,11), verts=[];
  for(let i=0;i<k;i++)verts.push(r*(0.78+Math.random()*0.42));
  return {id:uid++,x:pos.x,y:pos.y,r,verts,hp:r*2.2,maxHp:r*2.2,flash:0,dead:false,rot:rand(0,TAU),shards:Math.max(3,Math.round(r/6))}; }
function asteroidPos(){ for(let t=0;t<10;t++){ const x=rand(80,worldW-80),y=rand(80,worldH-80);
  if(!P||(x-P.x)**2+(y-P.y)**2>340*340)return{x,y}; } return{x:rand(80,worldW-80),y:rand(80,worldH-80)}; }
function fillAsteroids(){ asteroids=[]; const t=asteroidTarget();
  for(let i=0;i<t;i++)asteroids.push(makeAsteroid({x:rand(80,worldW-80),y:rand(80,worldH-80)})); }
function maintainAsteroids(dt){ asteroidTimer-=dt; if(asteroidTimer<=0){ asteroidTimer=2.0;
  if(asteroids.length<asteroidTarget())asteroids.push(makeAsteroid(asteroidPos())); } }
function damageAsteroid(a,dmg,color){ if(a.dead)return;
  if(Math.random()<P.critChance)dmg*=P.critMult;
  a.hp-=dmg; a.flash=0.08; if(color)burst(a.x,a.y,"#b9a98f",2,1.2); if(a.hp<=0)breakAsteroid(a); }
function breakAsteroid(a){ if(a.dead)return; a.dead=true; burst(a.x,a.y,"#b9a98f",18,4); shakeIt(4);
  for(let i=0;i<a.shards;i++){ const ang=rand(0,TAU),sp=rand(40,140);
    gems.push({x:a.x,y:a.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,pts:cfg.world.asteroidShard,r:5,life:gemLifeNow}); }
  if(Math.random()<cfg.world.asteroidCrate) crates.push({x:a.x,y:a.y,vx:rand(-20,20),vy:rand(-20,20),r:13,weaponId:randWeaponId()}); }

/* ---------------- spawning ---------------- */
function spawnEdge(){ const m=60,s=randi(0,3); let x,y;
  if(s===0){x=rand(cam.x-m,cam.x+viewW+m);y=cam.y-m;}
  else if(s===1){x=cam.x+viewW+m;y=rand(cam.y-m,cam.y+viewH+m);}
  else if(s===2){x=rand(cam.x-m,cam.x+viewW+m);y=cam.y+viewH+m;}
  else{x=cam.x-m;y=rand(cam.y-m,cam.y+viewH+m);}
  return {x:clamp(x,-m,worldW+m),y:clamp(y,-m,worldH+m)}; }
function makeEnemy(type,pos){ const hpMul=(1+(level-1)*cfg.spawn.hpPerLevel)*(1+levelTime/100*0.3)*(1+(intensity-1)*0.5)*D.hp;
  return {id:uid++,type,x:pos.x,y:pos.y,hp:type.hp*hpMul,maxHp:type.hp*hpMul,r:type.r,flash:0,dead:false,fireCd:rand(0.3,type.fireEvery||1)}; }
function pickType(){ const pool=[]; for(const k in ETYPES) if(levelTime>=ETYPES[k].unlock)pool.push(k);
  let total=0; for(const k of pool)total+=(ETYPES[k].wt||1);
  let r=Math.random()*total; for(const k of pool){r-=(ETYPES[k].wt||1);if(r<=0)return ETYPES[k];} return ETYPES.grunt; }
function doSpawn(dt){ spawnTimer-=dt;
  if(spawnTimer<=0&&enemies.length<cfg.spawn.maxEnemies){
    spawnTimer=clamp((cfg.spawn.startInterval-(level-1)*0.08-levelTime*0.008)/(D.spawn*intensity),cfg.spawn.minInterval*0.5,cfg.spawn.startInterval);
    const batch=1+Math.floor((level-1)/3);
    for(let b=0;b<batch;b++){ const type=pickType(),pos=spawnEdge();
      if(type.cluster){ const n=randi(type.cluster[0],type.cluster[1]);
        for(let i=0;i<n;i++)enemies.push(makeEnemy(type,{x:pos.x+rand(-40,40),y:pos.y+rand(-40,40)})); }
      else enemies.push(makeEnemy(type,pos)); } } }
function spawnBoss(){ const baseHp=(cfg.boss.hpBase+(level-1)*cfg.boss.hpPerLevel+Math.pow(Math.max(0,level-3),2)*cfg.boss.hpAccel)*D.boss;
  const n=BOSS_ORDER.length, dbl=level>=6&&level%2===0;
  const kinds=dbl?[BOSS_ORDER[(level-1)%n],BOSS_ORDER[level%n]]:[BOSS_ORDER[(level-1)%n]];
  const hpEach=dbl?baseHp*0.66:baseHp;
  for(const k of kinds){ const e=makeEnemy(BOSSES[k],spawnEdge()); e.hp=hpEach; e.maxHp=hpEach; initBossState(e); enemies.push(e); }
  bossesAlive=kinds.length;
  toast((kinds.length>1?"Two bosses":BOSSES[kinds[0]].name)+" \u00B7 Level "+level); }
function initBossState(e){ e.atkCd=rand(0.8,1.6); e.spin=0; e.sweepAng=rand(0,TAU);
  if(e.type.kind==="lance"){ e.lancePhase="idle"; e.lanceT=1.0; e.lanceAng=0; }
  if(e.type.kind==="reflect"){ e.shieldAng=Math.atan2(P.y-e.y,P.x-e.x); e.shieldCd=e.type.aimEvery; }
  if(e.type.kind==="sentinel"){ const ns=e.type.shards+Math.floor((level-1)/5); for(let s=0;s<ns;s++){ const sh=makeEnemy(SHARD_TYPE,{x:e.x,y:e.y});
    sh.hp=e.type.shardHp; sh.maxHp=e.type.shardHp; sh.parent=e.id; sh.orbAng=s/ns*TAU; sh.orbR=e.type.shardR; sh.orbSpin=e.type.shardSpin; enemies.push(sh); } } }
function rocket(x,y,ang,dmg){ const sp=155; return {x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,r:6,dmg:dmg*D.dmg,life:5,homing:true,turn:2.0}; }
function carrierDrone(lv){ return lv>=12?(ETYPES.orbiter||ETYPES.shooter):(lv>=6?ETYPES.shooter:ETYPES.swarmer); }
function updateLance(e,dt,dxp,dyp){ const T=e.type;
  if(e.lancePhase==="idle"){ e.lanceT-=dt; if(e.lanceT<=0){ e.lancePhase="warn"; e.lanceT=T.warn; } }
  else if(e.lancePhase==="warn"){ const want=Math.atan2(dyp,dxp), rate=T.turn*(1+(level-1)*0.06)*D.boss;
    let d=want-e.lanceAng; while(d>Math.PI)d-=TAU; while(d<-Math.PI)d+=TAU; e.lanceAng+=clamp(d,-rate*dt,rate*dt);
    e.lanceT-=dt; if(e.lanceT<=0){ e.lancePhase="lock"; e.lanceT=T.lock; shakeIt(2); } }
  else if(e.lancePhase==="lock"){ e.lanceT-=dt; if(e.lanceT<=0){ e.lancePhase="fire"; e.lanceT=T.fireDur; shakeIt(5); } }
  else{ const ca=Math.cos(e.lanceAng),sa=Math.sin(e.lanceAng),rx=P.x-e.x,ry=P.y-e.y,proj=rx*ca+ry*sa;
    if(proj>0&&proj<T.rayLen&&Math.abs(rx*sa-ry*ca)<T.rayW+P.radius) hurtPlayer(T.rayDmg*D.dmg);
    e.lanceT-=dt; if(e.lanceT<=0){ e.lancePhase="idle"; e.lanceT=T.cool; } } }
function launchBomb(e,T){ const a=Math.atan2(P.y-e.y,P.x-e.x)+rand(-0.35,0.35);
  const b=makeEnemy(BOMB_TYPE,{x:e.x,y:e.y}); b.vx=Math.cos(a)*T.bombSpeed; b.vy=Math.sin(a)*T.bombSpeed;
  b.fuse=T.bombFuse; b.hp=T.bombHp; b.maxHp=T.bombHp; b.radius=T.bombR; b.bombDmg=T.bombDmg*D.dmg; enemies.push(b); }
function bombDetonate(e){ if(e.dead)return; e.dead=true; addEffect({type:"ring",x:e.x,y:e.y,maxR:e.radius,life:0.35,max:0.35,color:"#ff5c3b"});
  burst(e.x,e.y,"#ff5c3b",16,4); shakeIt(6); if((P.x-e.x)**2+(P.y-e.y)**2<(e.radius+P.radius)**2)hurtPlayer(e.bombDmg); }
function explodeHazard(z){ addEffect({type:"ring",x:z.x,y:z.y,maxR:z.radius,life:0.3,max:0.3,color:"#b06bff"});
  burst(z.x,z.y,"#b06bff",14,3.5); shakeIt(5); hurtPlayer(z.dmg); }

/* ---------------- targeting + damage ---------------- */
const onScreen=o=>o.x>=cam.x&&o.x<=cam.x+viewW&&o.y>=cam.y&&o.y<=cam.y+viewH;
function aimTargets(x,y,n,range){ const r2=range*range, a=[];
  for(const e of enemies){ if(e.dead)continue; const d=(e.x-x)**2+(e.y-y)**2; if(d<=r2&&onScreen(e))a.push({o:e,d}); }
  if(!a.length){ for(const o of asteroids){ if(o.dead)continue; const d=(o.x-x)**2+(o.y-y)**2; if(d<=r2&&onScreen(o))a.push({o,d}); } }
  a.sort((p,q)=>p.d-q.d); return a.slice(0,n).map(o=>o.o); }
function nearestEnemyScoped(x,y,range,exclude){ const r2=range*range; let best=null,bd=r2;
  for(const e of enemies){ if(e.dead||(exclude&&exclude.has(e.id))||!onScreen(e))continue;
    const d=(e.x-x)**2+(e.y-y)**2; if(d<bd){bd=d;best=e;} } return best; }
function damageEnemy(e,dmg,color){ if(e.dead)return;
  if(Math.random()<P.critChance)dmg*=P.critMult;
  e.hp-=dmg; e.flash=0.08; if(color)burst(e.x,e.y,color,2,1.3);
  if(cfg.juice.damageNumbers)floats.push({x:e.x,y:e.y-e.r,vy:-40,life:.6,txt:Math.round(dmg),color:"#fff"});
  if(e.hp<=0)killEnemy(e); }
function killEnemy(e){ if(e.dead)return; e.dead=true;
  if(e.type.bomb){ burst(e.x,e.y,"#ffd84d",10,3); return; }
  kills++; levelKills++; killFlow+=1;
  burst(e.x,e.y,e.type.color,e.type.boss?34:9,e.type.boss?5:3);
  const g=e.type.gems||1,val=e.type.pts||1;
  for(let i=0;i<g;i++){ const a=rand(0,TAU),sp=rand(40,150);
    gems.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,pts:val,r:e.type.boss?7:5,life:gemLifeNow}); }
  if(!e.type.boss&&Math.random()<cfg.econ.crateChance) crates.push({x:e.x,y:e.y,vx:rand(-20,20),vy:rand(-20,20),r:13,weaponId:randWeaponId()});
  if(!e.type.boss&&Math.random()<cfg.powerupChance) addPowerup(e.x,e.y,ABILITY_IDS[randi(0,ABILITY_IDS.length-1)]);
  if(!e.type.boss&&Math.random()<cfg.tokenChance) tokenDrops.push({x:e.x,y:e.y,vx:rand(-30,30),vy:rand(-30,30),r:10,life:20});
  if(e.type.boss){ shakeIt(16);
    if(e.type.kind==="splitter"&&!e.isChild){ for(let s=0;s<2;s++){ const c=makeEnemy(SPLITLING,{x:e.x+rand(-30,30),y:e.y+rand(-30,30)});
      const chp=Math.round(e.maxHp*0.35); c.hp=chp; c.maxHp=chp; c.isChild=true; initBossState(c); enemies.push(c); } bossesAlive+=2; }
    const tok=2+Math.floor(level/2); addTokens(tok); toast("+"+tok+" tokens"); bossesAlive--; if(bossesAlive<=0)pendingShop=true; } }
function explode(x,y,radius,damage,color){ const r2=radius*radius;
  for(const e of enemies){ if(!e.dead && (e.x-x)**2+(e.y-y)**2<r2)damageEnemy(e,damage,color); }
  for(const o of asteroids){ if(!o.dead && (o.x-x)**2+(o.y-y)**2<r2)damageAsteroid(o,damage,color); }
  addEffect({type:"ring",x,y,maxR:radius,life:0.35,max:0.35,color}); burst(x,y,color,16,4); shakeIt(5); }
function hurtPlayer(dmg){ if(P.shielding||P.invuln>0)return;
  const g=satGeom();
  if(g){ const sp=g.pos[g.pos.length-1]; P.weaponLevels.satellite=Math.max(0,P.weaponLevels.satellite-1); P.satCd=null; P.invuln=P.iframes;
    burst(sp.x,sp.y,"#aef3ff",16,3.5); burst(sp.x,sp.y,"#ff3b5c",6,2.5); addEffect({type:"ring",x:sp.x,y:sp.y,maxR:34,life:0.3,max:0.3,color:"#aef3ff"}); shakeIt(5); toast("Satellite down"); return; }
  P.hp-=dmg; P.invuln=P.iframes;
  shakeIt(6); burst(P.x,P.y,"#ff3b5c",10,3.5); if(P.hp<=0){P.hp=0;burst(P.x,P.y,"#36e6ff",40,5);gameOver();} }
function raiseShieldPulse(){ burstRing(P.x,P.y,"#36e6ff",24); shakeIt(4); const R=P.shieldShove;
  for(const e of enemies){ if(e.type.boss)continue; const dx=e.x-P.x,dy=e.y-P.y,d=Math.hypot(dx,dy)||1;
    if(d<R){const f=(1-d/R)*R*0.9; e.x+=dx/d*f; e.y+=dy/d*f;} }
  ebullets=ebullets.filter(b=>Math.hypot(b.x-P.x,b.y-P.y)>R*0.8); }

/* ---------------- fx ---------------- */
function addEffect(e){ effects.push(e); if(effects.length>120)effects.splice(0,effects.length-120); }
function burst(x,y,color,n,spd){ for(let i=0;i<n;i++){ const a=rand(0,TAU),s=rand(.3,1)*spd*60;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:rand(.3,.6),max:.6,color,r:rand(1.5,3.5)}); }
  if(parts.length>800)parts.splice(0,parts.length-800); }
function burstRing(x,y,color,n){ for(let i=0;i<n;i++){ const a=i/n*TAU,s=rand(180,260);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.4,max:.4,color,r:2.5}); } }
function shakeIt(v){ if(cfg.juice.shake)shake=Math.max(shake,v); }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.remove("show"); void t.offsetWidth; t.classList.add("show"); }

/* ---------------- satellites (tertiary) ---------------- */
function satGeom(){ if(!P||P.slots.tertiary!=="satellite")return null;
  const s=WEAPONS.satellite.stats(P.weaponLevels.satellite); if(s.count<=0)return null;
  const out=[]; for(let i=0;i<s.count;i++){ const a=P.satAngle+i/s.count*TAU; out.push({x:P.x+Math.cos(a)*s.orbit,y:P.y+Math.sin(a)*s.orbit,size:s.size}); }
  return {pos:out,dmg:s.dmg,cooldown:s.cooldown,range:s.range,speed:s.speed}; }
function updateSatellites(dt){ const g=satGeom(); if(!g)return; P.satAngle+=1.6*dt;
  if(!P.satCd||P.satCd.length!==g.pos.length) P.satCd=g.pos.map((_,i)=>0.25+i*0.12);
  for(let i=0;i<g.pos.length;i++){ P.satCd[i]-=dt; if(P.satCd[i]>0)continue;
    const sp=g.pos[i], tgt=nearestEnemyScoped(sp.x,sp.y,g.range); if(!tgt){P.satCd[i]=0.12;continue;}
    const a=Math.atan2(tgt.y-sp.y,tgt.x-sp.x);
    bullets.push({x:sp.x,y:sp.y,vx:Math.cos(a)*g.speed,vy:Math.sin(a)*g.speed,r:3.5,life:1.0,dmg:g.dmg*P.mDamage,pierce:0,hits:0,seen:new Set()});
    P.satCd[i]=g.cooldown; } }

/* ---------------- weapon acquisition ---------------- */
function applyWeapon(id){ const def=WEAPONS[id], slot=def.slot, cur=P.slots[slot];
  if(cur===id){ if(P.weaponLevels[id]<def.maxLevel){P.weaponLevels[id]++; toast(def.name+" \u2192 Lv "+P.weaponLevels[id]);} else toast(def.name+" maxed"); }
  else{ P.slots[slot]=id; if(!P.weaponLevels[id])P.weaponLevels[id]=Math.min(def.maxLevel,metaMinLevel()); P.wcd[slot]=0;
    toast((cur?"Switched \u2192 ":"Equipped ")+def.name+" \u00B7 Lv "+P.weaponLevels[id]); }
  weaponsDirty=true; }
function randWeaponId(){ const ids=Object.keys(WEAPONS).filter(id=>meta.unlocked[id]); if(!ids.length)return "cannon";
  const w=ids.map(id=>{ const def=WEAPONS[id];
    return !P.slots[def.slot]?3 : P.slots[def.slot]===id?1.3 : 1; });
  let tot=0; w.forEach(x=>tot+=x); let r=Math.random()*tot;
  for(let i=0;i<ids.length;i++){ r-=w[i]; if(r<=0)return ids[i]; } return ids[0]; }

/* ---------------- abilities ---------------- */
function addPowerup(x,y,type){ powerups.push({x,y,vx:rand(-30,30),vy:rand(-30,30),r:12,type,life:cfg.powerupLife}); }
function giveAbility(type){ abilityQueue.push(type); if(abilityQueue.length>cfg.abilityMax)abilityQueue.shift();
  toast("Picked up "+ABILITIES[type].name); updateAbilityBtn(); }
function activateAbility(){ if(state!=="playing"||!abilityQueue.length)return; const A=ABILITIES[abilityQueue.shift()];
  if(A.instant)A.use(); else A.start(); updateAbilityBtn(); }
function updateAbilityBtn(){ const btn=$("abilityBtn");
  if(!abilityQueue.length){ btn.classList.add("empty"); $("abIco").textContent="\u26A1"; $("abName").textContent=""; $("abCount").style.display="none"; return; }
  const A=ABILITIES[abilityQueue[0]]; btn.classList.remove("empty"); $("abIco").textContent=A.icon; $("abName").textContent=A.name;
  const c=$("abCount"); c.textContent=abilityQueue.length; c.style.display=abilityQueue.length>1?"block":"none"; }

/* ---------------- shop ---------------- */
function openShop(){ for(const g of gems)points+=g.pts; gems=[];
  enemies=[];ebullets=[];rockets=[];bombs=[];mines=[];crates=[];powerups=[];hazards=[];tokenDrops=[];bubbleTime=0;overTime=0;
  state="shop"; $("hud").classList.add("hide"); shieldBtn.classList.add("hide"); $("pauseBtn").classList.add("hide"); $("abilityBtn").classList.add("hide");
  $("shopTitle").textContent="Level "+level+" Cleared";
  shopOffers=buildShopOffers(); renderShop(); show("shopScreen"); }
function buildShopOffers(){ const pool=[];
  STAT_UPGRADES.forEach(u=>{ const lv=upCount[u.id]||0; if(!u.max||lv<u.max)
    pool.push({u,cost:Math.round(u.cost*Math.pow(cfg.econ.costGrowth,lv)*levelCostMul()*cfg.econ.upgradeMul)}); });
  for(let i=pool.length-1;i>0;i--){const j=randi(0,i);[pool[i],pool[j]]=[pool[j],pool[i]];}
  return pool.slice(0,cfg.econ.offers); }
function renderShop(){ $("shopBal").textContent=points; $("shopTokens").textContent=meta.tokens;
  $("rerollBtn").textContent="Reroll \u00B7 \u25C6"+Math.round(cfg.econ.reroll*levelCostMul());
  $("repairBtn").textContent="Repair \u00B7 \u25C6"+Math.round(cfg.econ.repairCost*levelCostMul());
  $("nextBtn").textContent="Begin Level "+(level+1);
  const wrap=$("shopCards"); wrap.innerHTML="";
  shopOffers.forEach((o,i)=>{ const afford=points>=o.cost, lv=upCount[o.u.id]||0;
    const el=document.createElement("div"); el.className="card"+(afford?"":" disabled");
    el.innerHTML=`<div class="ic">${o.u.ic}</div><div class="nm">${o.u.nm}</div><div class="ds">${o.u.ds}</div>
      ${lv?`<div class="tag">Owned x${lv}</div>`:""}<div class="cost">\u25C6 ${o.cost}</div>`;
    if(afford)el.addEventListener("click",()=>buyOffer(i)); wrap.appendChild(el); }); }
function buyOffer(i){ const o=shopOffers[i]; if(!o||points<o.cost)return; points-=o.cost;
  o.u.fn(P); upCount[o.u.id]=(upCount[o.u.id]||0)+1;
  shopOffers.splice(i,1); renderShop(); }
function reroll(){ const c=Math.round(cfg.econ.reroll*levelCostMul()); if(points<c)return; points-=c; shopOffers=buildShopOffers(); renderShop(); }
function repair(){ const c=Math.round(cfg.econ.repairCost*levelCostMul()); if(points<c||P.hp>=P.maxHP)return; points-=c;
  P.hp=Math.min(P.maxHP,P.hp+cfg.econ.repairAmt); renderShop(); }
function nextLevel(){ hide("shopScreen"); level++; levelTime=0; levelKills=0; bossSpawned=false; spawnTimer=0;
  state="playing"; $("hud").classList.remove("hide"); shieldBtn.classList.remove("hide"); $("pauseBtn").classList.remove("hide"); $("abilityBtn").classList.remove("hide"); updateAbilityBtn(); }

/* ---------------- update ---------------- */
function update(dt){
  levelTime+=dt; totalTime+=dt;
  killFlow=Math.max(0,killFlow-killFlow*cfg.dda.decay*dt); intensity=clamp(1+killFlow/cfg.dda.k,1,cfg.dda.max);
  if(bubbleTime>0)bubbleTime-=dt; if(overTime>0)overTime-=dt;
  if(!bossSpawned&&levelKills>=killsForBoss()){ spawnBoss(); bossSpawned=true; }
  if(!bossSpawned) doSpawn(dt);
  maintainAsteroids(dt);

  /* movement */
  let kx=0,ky=0;
  if(keys.w||keys.arrowup)ky-=1; if(keys.s||keys.arrowdown)ky+=1;
  if(keys.a||keys.arrowleft)kx-=1; if(keys.d||keys.arrowright)kx+=1;
  let dvx=0,dvy=0;
  if(kx||ky){const l=Math.hypot(kx,ky);dvx=kx/l*P.speed;dvy=ky/l*P.speed;}
  else if(tilt.on&&tilt.have){ let gx=tilt.gamma-tilt.g0, gy=tilt.beta-tilt.b0;
    if(Math.abs(gx)<tilt.dead)gx=0; if(Math.abs(gy)<tilt.dead)gy=0;
    dvx=clamp(gx/tilt.range,-1,1)*P.speed; dvy=clamp(-gy/tilt.range,-1,1)*P.speed; }
  else if(pointer.active){const psx=(P.x-cam.x)*Z,psy=(P.y-cam.y)*Z,dx=pointer.x-psx,dy=pointer.y-psy,d=Math.hypot(dx,dy);
    if(d>5){dvx=dx/d*P.speed;dvy=dy/d*P.speed;}}
  const t=Math.min(1,P.accel*dt); P.vx+=(dvx-P.vx)*t; P.vy+=(dvy-P.vy)*t;
  P.x=clamp(P.x+P.vx*dt,P.radius,worldW-P.radius); P.y=clamp(P.y+P.vy*dt,P.radius,worldH-P.radius);
  for(const a of asteroids){ if(a.dead)continue; const ax=P.x-a.x,ay=P.y-a.y,ad=Math.hypot(ax,ay)||1,mn=P.radius+a.r;
    if(ad<mn){ P.x=a.x+ax/ad*mn; P.y=a.y+ay/ad*mn; } }
  updateCamera();
  if(P.invuln>0)P.invuln-=dt; if(P.regen>0&&P.hp<P.maxHP)P.hp=Math.min(P.maxHP,P.hp+P.regen*dt);

  /* shield */
  P.shielding=shieldInput&&P.shield>0;
  if(P.shielding){ if(!P.prevShield)raiseShieldPulse(); P.shield=Math.max(0,P.shield-P.shieldDrain*dt); P.shieldCd=P.shieldDelay; }
  else{ if(P.shieldCd>0)P.shieldCd-=dt; else P.shield=Math.min(P.shieldMax,P.shield+P.shieldRecharge*dt); }
  P.prevShield=P.shielding;

  /* weapons (one per slot) */
  if(!P.shielding) for(const slot of ["main","secondary","tertiary"]){ const id=P.slots[slot]; if(!id)continue; const def=WEAPONS[id];
    if(def.passive)continue; P.wcd[slot]-=dt;
    if(P.wcd[slot]<=0){ const s=def.stats(P.weaponLevels[id]); const sd=P.mDamage; if(overTime>0)P.mDamage*=1.6;
      def.fire(P,s); P.mDamage=sd; P.wcd[slot]=s.cooldown*P.mCooldown*(overTime>0?0.45:1); } }
  updateSatellites(dt);
  { const mid=P.slots.main, aiming=!P.shielding&&mid&&aimTargets(P.x,P.y,1,WEAPONS[mid].range).length>0;
    if(!aiming&&Math.hypot(P.vx,P.vy)>25) P.dir=Math.atan2(P.vy,P.vx); }

  /* player bullets (hit enemies + asteroids) */
  for(let i=bullets.length-1;i>=0;i--){ const b=bullets[i]; b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0){bullets.splice(i,1);continue;}
    let removed=false;
    for(const e of enemies){ if(e.dead||b.seen.has(e.id))continue;
      if((b.x-e.x)**2+(b.y-e.y)**2<(b.r+e.r)**2){
        if(e.type.kind==="reflect"){ let ad=Math.atan2(b.y-e.y,b.x-e.x)-(e.shieldAng||0); while(ad>Math.PI)ad-=TAU; while(ad<-Math.PI)ad+=TAU;
          if(Math.abs(ad)<e.type.shieldArc){ if(Math.random()<e.type.reflectChance){ const sp=270,bd=Math.hypot(b.vx,b.vy)||1; ebullets.push({x:b.x,y:b.y,vx:-b.vx/bd*sp,vy:-b.vy/bd*sp,r:5,dmg:(e.type.rDmg||14)*D.dmg,life:4}); } else burst(b.x,b.y,e.type.color,4,2);
            bullets.splice(i,1);removed=true;break; } }
        b.seen.add(e.id); damageEnemy(e,b.dmg,e.type.color);
        b.hits++; if(b.hits>b.pierce){bullets.splice(i,1);removed=true;break;} } }
    if(removed)continue;
    for(const o of asteroids){ if(o.dead||b.seen.has(o.id))continue;
      if((b.x-o.x)**2+(b.y-o.y)**2<(b.r+o.r)**2){ b.seen.add(o.id); damageAsteroid(o,b.dmg,"#cbb");
        b.hits++; if(b.hits>b.pierce){bullets.splice(i,1);break;} } } }

  /* rockets */
  for(let i=rockets.length-1;i>=0;i--){ const r=rockets[i]; r.life-=dt;
    if(r.homing!==false){ let tgt=r.target!=null?enemies.find(e=>e.id===r.target&&!e.dead):null; if(!tgt){tgt=nearestEnemyScoped(r.x,r.y,560);r.target=tgt?tgt.id:null;}
      if(tgt){ const want=Math.atan2(tgt.y-r.y,tgt.x-r.x),cur=Math.atan2(r.vy,r.vx); let d=want-cur;
        while(d>Math.PI)d-=TAU; while(d<-Math.PI)d+=TAU; const na=cur+clamp(d,-r.turn*dt,r.turn*dt);
        r.vx=Math.cos(na)*r.speed; r.vy=Math.sin(na)*r.speed; } }
    r.x+=r.vx*dt; r.y+=r.vy*dt;
    if(Math.random()<0.6)parts.push({x:r.x,y:r.y,vx:rand(-8,8),vy:rand(-8,8),life:.3,max:.3,color:"#9a8",r:2});
    let boom=r.life<=0;
    if(!boom)for(const e of enemies){if(e.dead)continue;if((e.x-r.x)**2+(e.y-r.y)**2<(e.r+6)**2){boom=true;break;}}
    if(!boom)for(const o of asteroids){if(o.dead)continue;if((o.x-r.x)**2+(o.y-r.y)**2<(o.r+6)**2){boom=true;break;}}
    if(boom){explode(r.x,r.y,r.radius,r.damage,"#ff7a29");rockets.splice(i,1);} }

  /* bombs */
  for(let i=bombs.length-1;i>=0;i--){ const b=bombs[i]; b.fuse-=dt; b.x+=b.vx*dt;b.y+=b.vy*dt;
    if(b.fuse<=0||((b.x-b.tx)**2+(b.y-b.ty)**2<400)){explode(b.x,b.y,b.radius,b.damage,"#ff5c3b");bombs.splice(i,1);} }

  /* mines (trigger on enemies; blast hits asteroids too) */
  for(let i=mines.length-1;i>=0;i--){ const m=mines[i]; if(m.arm>0){m.arm-=dt;continue;}
    let hit=false; for(const e of enemies){if(e.dead)continue;if((e.x-m.x)**2+(e.y-m.y)**2<(m.trig+e.r)**2){hit=true;break;}}
    if(hit){explode(m.x,m.y,m.radius,m.damage,"#ffb13d");mines.splice(i,1);} }

  /* enemies */
  for(const e of enemies){ if(e.dead)continue; const T=e.type; if(e.flash>0)e.flash-=dt;
    const dx=P.x-e.x,dy=P.y-e.y,dist=Math.hypot(dx,dy)||1;
    if(T.bomb){ e.x+=e.vx*dt; e.y+=e.vy*dt; e.fuse-=dt;
      if(e.fuse<=0||dist<P.radius+e.r){ bombDetonate(e); } continue; }
    if(T.orbit){ const par=enemies.find(p=>p.id===e.parent&&!p.dead);
      if(par){ e.orbAng+=e.orbSpin*dt; e.x=par.x+Math.cos(e.orbAng)*e.orbR; e.y=par.y+Math.sin(e.orbAng)*e.orbR; }
      else{ e.x+=dx/dist*70*dt; e.y+=dy/dist*70*dt; }
      const ox=P.x-e.x,oy=P.y-e.y; if(ox*ox+oy*oy<(e.r+P.radius)**2)hurtPlayer(T.dmg*D.dmg); continue; }
    if(T.boss){ e.x+=dx/dist*T.speed*dt; e.y+=dy/dist*T.speed*dt; e.atkCd-=dt;
      const bx=Math.floor((level-1)/3), bf=Math.max(0.5,1-(level-1)*0.022), rk=level>=8;
      if(T.kind==="warship"){ if(e.atkCd<=0){ const n=T.burst+bx; for(let k=0;k<n;k++){const a=k/n*TAU+levelTime*1.1;
          ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*T.bSpeed,vy:Math.sin(a)*T.bSpeed,r:5,dmg:T.bDmg*D.dmg,life:4});} e.atkCd=T.fireEvery*bf; } }
      else if(T.kind==="lance"){ updateLance(e,dt,dx,dy); }
      else if(T.kind==="layer"){ if(e.atkCd<=0){ const drops=1+Math.floor(bx/2); for(let q=0;q<drops;q++)hazards.push({x:e.x+rand(-30,30),y:e.y+rand(-30,30),r:11,arm:0.7,radius:T.mineR,dmg:T.mineDmg*D.dmg,life:T.mineLife}); e.atkCd=T.fireEvery*bf; } }
      else if(T.kind==="bombard"){ if(e.atkCd<=0){ const n=1+Math.floor(bx/3); for(let q=0;q<n;q++)launchBomb(e,T); e.atkCd=T.fireEvery*bf; } }
      else if(T.kind==="carrier"){ if(e.atkCd<=0){ const n=T.droneCount+bx, dd=carrierDrone(level); for(let q=0;q<n;q++)enemies.push(makeEnemy(dd,{x:e.x+rand(-44,44),y:e.y+rand(-44,44)})); if(rk)for(let q=0;q<2;q++){const a=Math.atan2(dy,dx)+rand(-0.35,0.35); ebullets.push(rocket(e.x,e.y,a,12));} e.atkCd=T.fireEvery*bf; } }
      else if(T.kind==="spinner"){ e.spin+=T.spinRate*dt; if(e.atkCd<=0){ const arms=T.arms+Math.floor(bx/3); for(let k=0;k<arms;k++){ const a=e.spin+k/arms*TAU;
        ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*T.bSpeed,vy:Math.sin(a)*T.bSpeed,r:5,dmg:T.bDmg*D.dmg,life:4.5}); } e.atkCd=T.fireEvery*bf; } }
      else if(T.kind==="sweeper"){ e.sweepAng+=T.sweep*(1+(level-1)*0.03)*dt; const ca=Math.cos(e.sweepAng),sa=Math.sin(e.sweepAng),rx=P.x-e.x,ry=P.y-e.y,proj=rx*ca+ry*sa;
        if(proj>0&&proj<T.rayLen&&Math.abs(rx*sa-ry*ca)<T.rayW+P.radius) hurtPlayer(T.rayDmg*D.dmg); }
      else if(T.kind==="gravity"){ const f=T.pull*(1+(level-1)*0.03)*dt; P.x=clamp(P.x+(e.x-P.x)/dist*f,P.radius,worldW-P.radius); P.y=clamp(P.y+(e.y-P.y)/dist*f,P.radius,worldH-P.radius);
        if(e.atkCd<=0){ const n=T.burst+bx; for(let k=0;k<n;k++){const a=k/n*TAU+levelTime; ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*T.bSpeed,vy:Math.sin(a)*T.bSpeed,r:5,dmg:T.bDmg*D.dmg,life:4.5});} e.atkCd=T.fireEvery*bf; } }
      else if(T.kind==="splitter"){ if(e.atkCd<=0){ const n=T.burst+bx; for(let k=0;k<n;k++){const a=k/n*TAU+levelTime*0.8; ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*T.bSpeed,vy:Math.sin(a)*T.bSpeed,r:5,dmg:T.bDmg*D.dmg,life:4});} e.atkCd=T.fireEvery*bf; } }
      else if(T.kind==="sniper"){ if(e.atkCd<=0){ const px=P.x+P.vx*T.lead,py=P.y+P.vy*T.lead,base=Math.atan2(py-e.y,px-e.x),shots=T.shots+Math.floor(bx/2);
        for(let s=0;s<shots;s++){ const a=base+(s-(shots-1)/2)*T.spread; ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*T.bSpeed,vy:Math.sin(a)*T.bSpeed,r:4,dmg:T.bDmg*D.dmg,life:3}); } e.atkCd=T.fireEvery*bf; } }
      else if(T.kind==="blink"){ if(e.atkCd<=0){ addEffect({type:"ring",x:e.x,y:e.y,maxR:54,life:0.3,max:0.3,color:T.color}); const ang0=rand(0,TAU);
        e.x=clamp(P.x+Math.cos(ang0)*T.blinkDist,60,worldW-60); e.y=clamp(P.y+Math.sin(ang0)*T.blinkDist,60,worldH-60);
        addEffect({type:"ring",x:e.x,y:e.y,maxR:54,life:0.3,max:0.3,color:T.color});
        const n=T.burst+bx; for(let k=0;k<n;k++){const a=k/n*TAU; ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*T.bSpeed,vy:Math.sin(a)*T.bSpeed,r:5,dmg:T.bDmg*D.dmg,life:4});} if(rk)ebullets.push(rocket(e.x,e.y,Math.atan2(dy,dx),14)); e.atkCd=T.fireEvery*bf; } }
      else if(T.kind==="pulsar"){ if(e.atkCd<=0){ hazards.push({kind:"ring",x:e.x,y:e.y,rad:34,max:T.ringMax,grow:T.ringSpeed,w:T.ringW,dmg:T.ringDmg*D.dmg,gapA:rand(0,TAU),gapW:Math.max(0.45,T.gapW-(level-1)*0.02),life:T.ringMax/T.ringSpeed+0.4}); e.atkCd=T.fireEvery*bf; } }
      else if(T.kind==="sentinel"){ if(e.atkCd<=0){ const n=T.burst+bx; for(let k=0;k<n;k++){const a=k/n*TAU+levelTime*0.6; ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*T.bSpeed,vy:Math.sin(a)*T.bSpeed,r:5,dmg:T.bDmg*D.dmg,life:4});} e.atkCd=T.fireEvery*bf; } }
      else if(T.kind==="reflect"){ e.shieldCd=(e.shieldCd||0)-dt; if(e.shieldCd<=0){ e.shieldAng=Math.atan2(dy,dx); e.shieldCd=T.aimEvery; addEffect({type:"ring",x:e.x,y:e.y,maxR:e.r+24,life:0.3,max:0.3,color:T.color}); }
        if(e.atkCd<=0){ const n=8+bx; for(let k=0;k<n;k++){const a=k/n*TAU+levelTime*0.5; ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*150,vy:Math.sin(a)*150,r:5,dmg:14*D.dmg,life:4.5}); } if(rk)ebullets.push(rocket(e.x,e.y,Math.atan2(dy,dx),16)); e.atkCd=2.8*bf; } } }
    else if(T.ranged){ if(dist>T.range){e.x+=dx/dist*T.speed*dt;e.y+=dy/dist*T.speed*dt;}
      else if(dist<T.range*0.7){e.x-=dx/dist*T.speed*dt;e.y-=dy/dist*T.speed*dt;}
      e.fireCd-=dt; if(dist<=T.range&&e.fireCd<=0){ const a=Math.atan2(P.y-e.y,P.x-e.x);
        ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*T.bSpeed,vy:Math.sin(a)*T.bSpeed,r:4.5,dmg:T.bDmg*D.dmg,life:4}); e.fireCd=T.fireEvery; } }
    else if(T.move==="weave"){ if((e.wobCd=(e.wobCd||0)-dt)<=0){ e.wobAmp=T.wobAmp*rand(0.6,1.4)*(Math.random()<0.5?-1:1); e.wobCd=rand(0.3,0.8); }
      e.wob=(e.wob||0)+dt*T.wobRate; const ux=dx/dist,uy=dy/dist, fwd=T.speed*dt, side=Math.sin(e.wob)*(e.wobAmp||T.wobAmp)*dt;
      e.x+=ux*fwd-uy*side; e.y+=uy*fwd+ux*side; }
    else if(T.move==="charge"){ if(!e.cs){e.cs="approach";e.cd=rand(0.5,1.2);}
      if(e.cs==="approach"){ e.x+=dx/dist*T.speed*dt; e.y+=dy/dist*T.speed*dt; e.cd-=dt; if(dist<T.chargeRange&&e.cd<=0){e.cs="wind";e.cd=T.windup;e.cdir=Math.atan2(dy,dx);addEffect({type:"ring",x:e.x,y:e.y,maxR:T.r*3.2,life:T.windup,max:T.windup,color:T.color});} }
      else if(e.cs==="wind"){ e.cd-=dt; if(e.cd<=0){e.cs="dash";e.cd=T.dashTime;shakeIt(2);} }
      else{ e.x+=Math.cos(e.cdir)*T.dashSpeed*dt; e.y+=Math.sin(e.cdir)*T.dashSpeed*dt; e.cd-=dt; if(e.cd<=0){e.cs="approach";e.cd=rand(0.8,1.6);} } }
    else if(T.move==="orbit"){ if(!e.odir)e.odir=Math.random()<0.5?1:-1; const ux=dx/dist,uy=dy/dist, rc=clamp((dist-T.orbitR)/120,-1,1);
      e.x+=(-uy*e.odir*T.speed+ux*rc*T.speed)*dt; e.y+=(ux*e.odir*T.speed+uy*rc*T.speed)*dt;
      e.fireCd-=dt; if(e.fireCd<=0){ const a=Math.atan2(dy,dx); ebullets.push({x:e.x,y:e.y,vx:Math.cos(a)*T.bSpeed,vy:Math.sin(a)*T.bSpeed,r:4.5,dmg:T.bDmg*D.dmg,life:4}); e.fireCd=T.fireEvery; } }
    else{ e.x+=dx/dist*T.speed*dt; e.y+=dy/dist*T.speed*dt; }
    if(dist<e.r+P.radius){ hurtPlayer(T.dmg*D.dmg);
      if(!T.boss){const k=Math.min(60,(e.r+P.radius-dist));e.x-=dx/dist*k;e.y-=dy/dist*k;} } }

  /* enemy bullets */
  const bubR=P.radius+30;
  for(let i=ebullets.length-1;i>=0;i--){ const b=ebullets[i];
    if(b.homing){ const want=Math.atan2(P.y-b.y,P.x-b.x),cur=Math.atan2(b.vy,b.vx); let da=want-cur; while(da>Math.PI)da-=TAU; while(da<-Math.PI)da+=TAU; const na=cur+clamp(da,-b.turn*dt,b.turn*dt),sp=Math.hypot(b.vx,b.vy); b.vx=Math.cos(na)*sp; b.vy=Math.sin(na)*sp; }
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0){ebullets.splice(i,1);continue;}
    let blocked=false; for(const o of asteroids){ if(o.dead)continue; if((b.x-o.x)**2+(b.y-o.y)**2<(b.r+o.r)**2){ damageAsteroid(o,b.dmg,"#cbb"); ebullets.splice(i,1); blocked=true; break; } }
    if(blocked)continue;
    if(bubbleTime>0&&(b.x-P.x)**2+(b.y-P.y)**2<(b.r+bubR)**2){ burst(b.x,b.y,"#aef3ff",3,2);ebullets.splice(i,1);continue; }
    if((b.x-P.x)**2+(b.y-P.y)**2<(b.r+P.radius)**2){
      if(P.shielding){burst(b.x,b.y,"#36e6ff",4,2);ebullets.splice(i,1);}
      else if(P.invuln<=0){hurtPlayer(b.dmg);ebullets.splice(i,1);} } }

  /* boss hazards (mines + pulsar rings) */
  for(let i=hazards.length-1;i>=0;i--){ const z=hazards[i];
    if(z.kind==="ring"){ z.rad+=z.grow*dt; z.life-=dt; if(z.rad>z.max||z.life<=0){hazards.splice(i,1);continue;}
      const ddx=P.x-z.x,ddy=P.y-z.y,pd=Math.hypot(ddx,ddy);
      if(Math.abs(pd-z.rad)<z.w+P.radius){ let da=Math.atan2(ddy,ddx)-z.gapA; while(da>Math.PI)da-=TAU; while(da<-Math.PI)da+=TAU; if(Math.abs(da)>z.gapW)hurtPlayer(z.dmg); } continue; }
    z.life-=dt; if(z.arm>0)z.arm-=dt;
    if(z.life<=0){hazards.splice(i,1);continue;}
    if(z.arm<=0&&(P.x-z.x)**2+(P.y-z.y)**2<(z.radius+P.radius)**2){ explodeHazard(z); hazards.splice(i,1); } }
  for(let i=gems.length-1;i>=0;i--){ const g=gems[i],dx=P.x-g.x,dy=P.y-g.y,d=Math.hypot(dx,dy)||1;
    g.life-=dt; if(g.life<=0){gems.splice(i,1);continue;}
    if(d<P.magnet){const pull=1-d/P.magnet;g.vx+=dx/d*900*pull*dt;g.vy+=dy/d*900*pull*dt;}
    g.vx*=0.9;g.vy*=0.9;g.x+=g.vx*dt;g.y+=g.vy*dt;
    if(d<P.radius+g.r){points+=g.pts;gems.splice(i,1);} }

  /* crates */
  for(let i=crates.length-1;i>=0;i--){ const c=crates[i],dx=P.x-c.x,dy=P.y-c.y,d=Math.hypot(dx,dy)||1;
    if(d<P.magnet*0.6){const pull=1-d/(P.magnet*0.6);c.vx+=dx/d*600*pull*dt;c.vy+=dy/d*600*pull*dt;}
    c.vx*=0.92;c.vy*=0.92;c.x+=c.vx*dt;c.y+=c.vy*dt;
    if(d<P.radius+c.r){applyWeapon(c.weaponId);crates.splice(i,1);} }

  /* power-ups (ability charges) */
  for(let i=powerups.length-1;i>=0;i--){ const u=powerups[i],dx=P.x-u.x,dy=P.y-u.y,d=Math.hypot(dx,dy)||1;
    u.life-=dt; if(u.life<=0){powerups.splice(i,1);continue;}
    if(d<P.magnet*0.7){const pull=1-d/(P.magnet*0.7);u.vx+=dx/d*640*pull*dt;u.vy+=dy/d*640*pull*dt;}
    u.vx*=0.92;u.vy*=0.92;u.x+=u.vx*dt;u.y+=u.vy*dt;
    if(d<P.radius+u.r){giveAbility(u.type);powerups.splice(i,1);} }

  /* token drops (meta currency) */
  for(let i=tokenDrops.length-1;i>=0;i--){ const k=tokenDrops[i],dx=P.x-k.x,dy=P.y-k.y,d=Math.hypot(dx,dy)||1;
    k.life-=dt; if(k.life<=0){tokenDrops.splice(i,1);continue;}
    if(d<P.magnet){const pull=1-d/P.magnet;k.vx+=dx/d*820*pull*dt;k.vy+=dy/d*820*pull*dt;}
    k.vx*=0.9;k.vy*=0.9;k.x+=k.vx*dt;k.y+=k.vy*dt;
    if(d<P.radius+k.r){addTokens(1);toast("+1 token");tokenDrops.splice(i,1);} }

  /* asteroids cleanup */
  for(const a of asteroids){ if(a.flash>0)a.flash-=dt; }
  asteroids=asteroids.filter(a=>!a.dead);

  /* particles / floats / effects */
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.92;p.vy*=0.92;p.life-=dt;if(p.life<=0)parts.splice(i,1);}
  for(let i=floats.length-1;i>=0;i--){const f=floats[i];f.y+=f.vy*dt;f.life-=dt;if(f.life<=0)floats.splice(i,1);}
  for(let i=effects.length-1;i>=0;i--){effects[i].life-=dt;if(effects[i].life<=0)effects.splice(i,1);}
  if(shake>0)shake=Math.max(0,shake-dt*40);

  enemies=enemies.filter(e=>!e.dead);
  if(pendingShop){pendingShop=false;openShop();}
}

/* ---------------- background ---------------- */
function makeStarField(n,maxR){ const a=[]; for(let i=0;i<n;i++)a.push({x:Math.random()*viewW,y:Math.random()*viewH,r:rand(.4,maxR),tw:rand(0,TAU),sp:rand(.4,1.3)}); return a; }
function makeBackground(){
  const cols=["#4a2f7a","#27457f","#1f6a64","#5e2a55","#283a72","#3a2f6a","#2a5a6a"];
  const vivid=[["#ff2d75","#3a0d4a"],["#19f0ff","#0d3a5a"],["#1dff9e","#0d4a3a"],["#ffb52e","#5a2a0d"],["#b46bff","#2a0d5a"]];
  nebulae=[]; const N=10;
  for(let i=0;i<N;i++){ if(Math.random()<0.16){ const v=vivid[randi(0,vivid.length-1)];
      nebulae.push({x:rand(0,worldW),y:rand(0,worldH),r:rand(300,520),color:v[0],color2:v[1],a:rand(0.13,0.20)}); }
    else nebulae.push({x:rand(0,worldW),y:rand(0,worldH),r:rand(360,680),color:cols[randi(0,cols.length-1)],a:rand(0.05,0.10)}); }
  starFar=makeStarField(Math.floor(viewW*viewH/5200),1.3);
  starNear=makeStarField(Math.floor(viewW*viewH/9500),2.2);
}
function drawNebulae(){ const par=0.45;
  for(const nb of nebulae){ const sx=nb.x-cam.x*par, sy=nb.y-cam.y*par;
    if(sx<-nb.r||sx>viewW+nb.r||sy<-nb.r||sy>viewH+nb.r)continue;
    const g=ctx.createRadialGradient(sx,sy,0,sx,sy,nb.r);
    g.addColorStop(0,hexA(nb.color,nb.a)); if(nb.color2)g.addColorStop(0.5,hexA(nb.color2,nb.a*0.55)); g.addColorStop(1,hexA(nb.color,0));
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,sy,nb.r,0,TAU); ctx.fill(); } }
function drawStars(layer,par,color,tnow){ const ox=((cam.x*par)%viewW+viewW)%viewW, oy=((cam.y*par)%viewH+viewH)%viewH; ctx.fillStyle=color;
  for(const s of layer){ let sx=s.x-ox; if(sx<0)sx+=viewW; let sy=s.y-oy; if(sy<0)sy+=viewH;
    ctx.globalAlpha=0.28+0.5*Math.max(0,Math.sin(tnow*s.sp+s.tw)); ctx.beginPath(); ctx.arc(sx,sy,s.r,0,TAU); ctx.fill(); }
  ctx.globalAlpha=1; }

/* ---------------- render ---------------- */
function poly(x,y,r,sides,rot){ ctx.beginPath();
  for(let i=0;i<sides;i++){const a=rot+i/sides*TAU,px=x+Math.cos(a)*r,py=y+Math.sin(a)*r;i?ctx.lineTo(px,py):ctx.moveTo(px,py);} ctx.closePath(); }
function render(){

  ctx.scale(Z,Z);

  drawStars(starFar,0.3,"#8aa0d8",tnow);

      ctx.shadowBlur=0;ctx.font='16px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",system-ui';ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(A.icon,0,1);ctx.restore(); }

      ctx.beginPath();for(let s=0;s<5;s++){const a1=-Math.PI/2+s*TAU/5,a2=a1+TAU/10;ctx.lineTo(Math.cos(a1)*tr,Math.sin(a1)*tr);ctx.lineTo(Math.cos(a2)*tr*0.45,Math.sin(a2)*tr*0.45);}ctx.closePath();ctx.fill();ctx.restore(); }

      ctx.fillStyle=`rgba(255,177,61,${0.4+blink*0.6})`;ctx.beginPath();ctx.arc(m.x,m.y,4,0,TAU);ctx.fill(); }
    // boss hazards (mines + pulsar rings)
    for(const z of hazards){ if(z.kind==="ring"){ ctx.save();ctx.lineCap="round";ctx.lineWidth=z.w*2;ctx.shadowBlur=12;ctx.shadowColor="#ff5cb4";
        ctx.strokeStyle="rgba(255,92,180,.6)";ctx.beginPath();ctx.arc(z.x,z.y,z.rad,z.gapA+z.gapW,z.gapA-z.gapW+TAU);ctx.stroke();ctx.restore();ctx.shadowBlur=0; continue; }
      const blink=z.arm>0?0.3:(0.5+0.5*Math.sin(tnow*9));
      ctx.fillStyle="rgba(176,107,255,.16)";ctx.beginPath();ctx.arc(z.x,z.y,z.radius,0,TAU);ctx.fill();
      ctx.strokeStyle=`rgba(176,107,255,${0.3+blink*0.4})`;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(z.x,z.y,z.radius,0,TAU);ctx.stroke();
      ctx.fillStyle=`rgba(208,170,255,${0.5+blink*0.5})`;ctx.beginPath();ctx.arc(z.x,z.y,5,0,TAU);ctx.fill(); }
    // enemies
    for(const e of enemies){ const T=e.type;
      if(T.bomb){ const pl=0.5+0.5*Math.sin(tnow*9); ctx.save();ctx.translate(e.x,e.y);
        ctx.shadowBlur=12;ctx.shadowColor="#ff8a3d";ctx.fillStyle=e.flash>0?"#fff":"rgba(255,200,80,.9)";
        ctx.beginPath();ctx.arc(0,0,e.r*0.7,0,TAU);ctx.fill();
        ctx.fillStyle=`rgba(255,80,59,${0.5+pl*0.5})`;ctx.beginPath();ctx.arc(0,0,e.r*0.32,0,TAU);ctx.fill();
        ctx.shadowBlur=0;ctx.strokeStyle="rgba(255,255,255,.4)";ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,e.r*0.7,0,TAU);ctx.stroke();ctx.restore();
        const wB=e.r*1.6,hpB=e.hp/e.maxHp;ctx.fillStyle="rgba(0,0,0,.4)";ctx.fillRect(e.x-wB/2,e.y-e.r-7,wB,3);ctx.fillStyle="#ffd84d";ctx.fillRect(e.x-wB/2,e.y-e.r-7,wB*hpB,3);
        continue; }
      ctx.fillStyle=e.flash>0?"#fff":T.color;
      if(T.sides===0){ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,TAU);ctx.fill();}
      else{const rot=T.boss?tnow*0.6:Math.atan2(P.y-e.y,P.x-e.x);poly(e.x,e.y,e.r,T.sides,rot);ctx.fill();}
      ctx.lineWidth=2;ctx.strokeStyle="rgba(255,255,255,.25)";ctx.stroke();
      if(T.boss){ if(T.kind==="lance"&&e.lancePhase&&e.lancePhase!=="idle"){ const ph=e.lancePhase,ca=Math.cos(e.lanceAng),sa=Math.sin(e.lanceAng),len=T.rayLen;
          ctx.save();ctx.lineCap="round";ctx.shadowColor="#ff7a29";
          if(ph==="warn"){ctx.shadowBlur=6;ctx.strokeStyle="rgba(255,160,80,.45)";ctx.lineWidth=2;}
          else if(ph==="lock"){ctx.shadowBlur=14;ctx.strokeStyle=`rgba(255,185,95,${0.55+0.45*Math.sin(tnow*42)})`;ctx.lineWidth=4+2*Math.sin(tnow*42);}
          else{ctx.shadowBlur=20;ctx.strokeStyle=`rgba(255,120,30,${0.75+0.25*Math.sin(tnow*30)})`;ctx.lineWidth=T.rayW*2;}
          ctx.beginPath();ctx.moveTo(e.x,e.y);ctx.lineTo(e.x+ca*len,e.y+sa*len);ctx.stroke();ctx.restore();ctx.shadowBlur=0; }
        if(T.kind==="sweeper"){ const ca=Math.cos(e.sweepAng),sa=Math.sin(e.sweepAng),len=T.rayLen;
          ctx.save();ctx.lineCap="round";ctx.shadowBlur=16;ctx.shadowColor=T.color;ctx.strokeStyle=`rgba(54,230,255,${0.55+0.2*Math.sin(tnow*22)})`;ctx.lineWidth=T.rayW*2;
          ctx.beginPath();ctx.moveTo(e.x,e.y);ctx.lineTo(e.x+ca*len,e.y+sa*len);ctx.stroke();ctx.restore();ctx.shadowBlur=0; }
        if(T.kind==="gravity"){ for(let q=0;q<3;q++){ const rr=(e.r+62)-((tnow*46+q*22)%66); if(rr<e.r)continue; ctx.save();ctx.globalAlpha=0.3*(rr-e.r)/66;
          ctx.strokeStyle=T.color;ctx.lineWidth=2;ctx.beginPath();ctx.arc(e.x,e.y,rr,0,TAU);ctx.stroke();ctx.restore(); } ctx.globalAlpha=1; }
        if(T.kind==="reflect"){ const sa=e.shieldAng||0, arc=T.shieldArc, rr=e.r+11;
          ctx.save();ctx.lineCap="round";ctx.shadowBlur=16;ctx.shadowColor="#ffd84d";
          ctx.globalAlpha=0.12;ctx.fillStyle="#ffd84d";ctx.beginPath();ctx.moveTo(e.x,e.y);ctx.arc(e.x,e.y,rr,sa-arc,sa+arc);ctx.closePath();ctx.fill();ctx.globalAlpha=1;
          ctx.strokeStyle=`rgba(255,216,77,${0.7+0.25*Math.sin(tnow*12)})`;ctx.lineWidth=5;ctx.beginPath();ctx.arc(e.x,e.y,rr,sa-arc,sa+arc);ctx.stroke();
          ctx.restore();ctx.shadowBlur=0; }

        ctx.fillStyle=T.color;ctx.fillRect(e.x-w/2,e.y-e.r-16,w*hp,5);

    // effects

      else if(fx.type==="bolt"){ ctx.globalAlpha=a;ctx.shadowBlur=10;ctx.shadowColor=fx.color;ctx.strokeStyle=fx.color;ctx.lineWidth=2.5;
        const seg=5;ctx.beginPath();ctx.moveTo(fx.x1,fx.y1);

        ctx.lineTo(fx.x2,fx.y2);ctx.stroke(); }
      else if(fx.type==="ring"){ const cr=fx.maxR*(1-a);ctx.globalAlpha=a;ctx.shadowBlur=12;ctx.shadowColor=fx.color;
        ctx.strokeStyle=fx.color;ctx.lineWidth=3;ctx.beginPath();ctx.arc(fx.x,fx.y,cr,0,TAU);ctx.stroke(); } }
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    // enemy bullets

    for(const b of ebullets){ if(b.homing){ ctx.save();ctx.translate(b.x,b.y);ctx.rotate(Math.atan2(b.vy,b.vx));ctx.shadowColor="#ff8a3d";ctx.shadowBlur=12;ctx.fillStyle="#ffce6b";
        ctx.beginPath();ctx.moveTo(b.r*1.7,0);ctx.lineTo(-b.r,b.r*0.85);ctx.lineTo(-b.r*0.5,0);ctx.lineTo(-b.r,-b.r*0.85);ctx.closePath();ctx.fill();ctx.restore(); }
      else { ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,TAU);ctx.fill(); } }
    // player bullets
    ctx.shadowColor="#36e6ff";ctx.strokeStyle="#aef3ff";ctx.lineWidth=3;ctx.lineCap="round";
    for(const b of bullets){ctx.beginPath();ctx.moveTo(b.x-b.vx*0.016,b.y-b.vy*0.016);ctx.lineTo(b.x,b.y);ctx.stroke();}
    // rockets
    for(const r of rockets){ ctx.save();ctx.translate(r.x,r.y);ctx.rotate(Math.atan2(r.vy,r.vx));
      ctx.shadowColor="#ff7a29";ctx.fillStyle="#ffb13d";ctx.beginPath();ctx.moveTo(7,0);ctx.lineTo(-5,4);ctx.lineTo(-5,-4);ctx.closePath();ctx.fill();ctx.restore(); }
    // bombs
    for(const b of bombs){ const pl=0.5+0.5*Math.sin(tnow*10);ctx.shadowColor="#ff5c3b";ctx.fillStyle=`rgba(255,92,59,${0.6+pl*0.4})`;
      ctx.beginPath();ctx.arc(b.x,b.y,6,0,TAU);ctx.fill(); }

    const flick=P.invuln>0&&Math.floor(tnow*20)%2===0;
    const od=overTime>0; ctx.shadowBlur=od?20:14;ctx.shadowColor=od?"#ffd84d":"#36e6ff";ctx.fillStyle=flick?"rgba(54,230,255,.35)":(od?"#ffe27a":"#36e6ff");
    ctx.beginPath();ctx.moveTo(P.radius+3,0);ctx.lineTo(-P.radius,P.radius-2);ctx.lineTo(-P.radius+4,0);ctx.lineTo(-P.radius,-(P.radius-2));ctx.closePath();ctx.fill();
    ctx.restore();

    if(bubbleTime>0){ const br=P.radius+30, fade=Math.min(1,bubbleTime/0.8), pulse=0.4+0.2*Math.sin(tnow*7);ctx.save();ctx.translate(P.x,P.y);

      ctx.beginPath();ctx.arc(0,0,br,0,TAU);ctx.stroke();ctx.fillStyle=`rgba(120,200,255,${0.10*fade})`;ctx.fill();ctx.restore();ctx.shadowBlur=0; }
    // satellites
    {const g=satGeom(); if(g){ ctx.shadowBlur=10;ctx.shadowColor="#36e6ff";ctx.fillStyle="#aef3ff";
      for(const sp of g.pos){ctx.beginPath();ctx.arc(sp.x,sp.y,sp.size,0,TAU);ctx.fill();} ctx.shadowBlur=0;} }
    // repair drone (visible regen)
    if(P&&P.regen>0){ const a=tnow*2.3, rx=P.x+Math.cos(a)*30, ry=P.y+Math.sin(a)*30;
      if(P.hp<P.maxHP){ ctx.save();ctx.globalAlpha=0.35+0.3*Math.sin(tnow*10);ctx.strokeStyle="#4dffa3";ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(P.x,P.y);ctx.stroke();ctx.restore();ctx.globalAlpha=1; }
      ctx.save();ctx.translate(rx,ry);ctx.rotate(a+Math.PI/2);ctx.shadowBlur=10;ctx.shadowColor="#4dffa3";ctx.fillStyle="#7dffc0";ctx.fillRect(-3.5,-2.5,7,5);ctx.strokeStyle="#caffe6";ctx.lineWidth=1;ctx.strokeRect(-3.5,-2.5,7,5);ctx.restore();ctx.shadowBlur=0; }
    // particles
    for(const p of parts){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,TAU);ctx.fill();}
    ctx.globalAlpha=1;
    if(cfg.juice.damageNumbers){ctx.font="700 13px ui-monospace,monospace";ctx.textAlign="center";
      for(const f of floats){ctx.globalAlpha=Math.max(0,f.life/.6);ctx.fillStyle=f.color;ctx.fillText(f.txt,f.x,f.y);}ctx.globalAlpha=1;ctx.textAlign="start";}

    ctx.restore(); // end world space
  }
  ctx.restore();
  if(state==="playing"||state==="paused")updateHUD();
}
function updateHUD(){
  if(weaponsDirty){ const wrap=$("weapons");wrap.innerHTML="";
    for(const slot of ["main","secondary","tertiary"]){ const id=P.slots[slot]; const c=document.createElement("div"); c.className="wchip"+(id?"":" empty");
      c.innerHTML=id?`<span class="wi">${WEAPONS[id].icon}</span><span class="wl">L${P.weaponLevels[id]}</span>`:`<span class="wi">\u00B7</span><span class="wl">\u2014</span>`;
      wrap.appendChild(c);} weaponsDirty=false; }
  $("lvlVal").textContent=level; $("ptsVal").textContent=points; $("killVal").textContent=kills;
  const bs=$("bossStat");
  if(bossSpawned){bs.classList.add("active");$("bossVal").textContent="\u2694";$("bossLab").textContent="Boss";}
  else{bs.classList.remove("active");$("bossVal").textContent=Math.max(0,killsForBoss()-levelKills);$("bossLab").textContent="Boss In";}
  $("hpFill").style.transform=`scaleX(${clamp(P.hp/P.maxHP,0,1)})`;
  $("hpText").textContent=Math.ceil(P.hp)+" / "+P.maxHP;
  $("shFill").style.transform=`scaleX(${clamp(P.shield/P.shieldMax,0,1)})`;
}

/* ---------------- loop ---------------- */
let last=performance.now();
function frame(now){ let dt=(now-last)/1000; last=now; dt=Math.min(dt,0.05);
  if(state==="playing")update(dt); render(); requestAnimationFrame(frame); }

/* ---------------- persistence ---------------- */
function loadBest(){ try{return parseInt(localStorage.getItem("starshard_best"))||0;}catch(e){return 0;} }
function saveBest(v){ try{localStorage.setItem("starshard_best",String(v));}catch(e){} }
function defaultMeta(){ return {tokens:0, unlocked:{cannon:true,mine:true,rocket:true,lightning:false,laser:false,torpedo:false,satellite:false}, tiers:{minlevel:0,hp:0,dmg:0,treasure:0}}; }
function loadMeta(){ try{ const m=JSON.parse(localStorage.getItem("starshard_meta")); if(!m||typeof m!=="object")return defaultMeta();
    const d=defaultMeta(); return {tokens:m.tokens|0, unlocked:Object.assign(d.unlocked,m.unlocked||{}), tiers:Object.assign(d.tiers,m.tiers||{})}; }catch(e){return defaultMeta();} }
function saveMeta(){ try{localStorage.setItem("starshard_meta",JSON.stringify(meta));}catch(e){} }
function addTokens(n){ meta.tokens+=n; saveMeta(); }

resize(); requestAnimationFrame(frame);
</script>
